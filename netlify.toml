[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "no-store"
